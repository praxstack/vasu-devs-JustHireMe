<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">JustHireMe hand drawn banner</title>
  <desc id="desc">A matte hand-drawn JustHireMe banner with sketched local-first job intelligence components.</desc>
  <defs>
    <filter id="paperNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="4" seed="28" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.075"/>
      </feComponentTransfer>
    </filter>
    <filter id="inkWobble" x="-4%" y="-8%" width="108%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="9" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <style>
      .paper { fill: #F3EFE4; }
      .ink { stroke: #211B15; }
      .mutedInk { stroke: #5F574E; }
      .coral { stroke: #C96442; }
      .teal { stroke: #5A9DA8; }
      .green { stroke: #6A9068; }
      .purple { stroke: #8B7BB8; }
      .ochre { stroke: #C49840; }
      .washCoral { fill: #F6CDBF; }
      .washTeal { fill: #CFE4DF; }
      .washGreen { fill: #DCEAD4; }
      .washPurple { fill: #E7DDF1; }
      .washOchre { fill: #F2DF9F; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .hand { font-family: "Segoe Print", "Bradley Hand ITC", "Comic Sans MS", ui-rounded, cursive; }
      .mono { font-family: "JetBrains Mono", Consolas, ui-monospace, monospace; }
      .label { font-size: 23px; font-weight: 800; letter-spacing: 0; fill: #211B15; }
      .tiny { font-size: 17px; font-weight: 750; letter-spacing: 0; fill: #5F574E; }
      .line { fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke-width: 3; }
      .med { stroke-width: 5; }
      .fat { stroke-width: 8; }
    </style>
  </defs>

