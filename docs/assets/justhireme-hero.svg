<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">JustHireMe system banner</title>
  <desc id="desc">A matte pastel README banner aligned to the JustHireMe interface design system.</desc>
  <defs>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,400..750,50&amp;family=Inter:wght@500;600;700;800&amp;family=JetBrains+Mono:wght@500;700&amp;display=swap");
      .display { font-family: "Fraunces", "Instrument Serif", Georgia, serif; font-variation-settings: "opsz" 144, "SOFT" 50; }
      .sans { font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: "JetBrains Mono", ui-monospace, Consolas, monospace; }
      .label { font: 700 22px "Inter", system-ui, sans-serif; fill: #1F1A14; letter-spacing: 0; }
      .small { font: 600 16px "Inter", system-ui, sans-serif; fill: #4A463E; letter-spacing: 0; }
      .tiny { font: 700 13px "JetBrains Mono", Consolas, monospace; fill: #8A847A; letter-spacing: 0.04em; }
      .panel { fill: rgba(255,255,255,0.54); stroke: rgba(201,100,66,0.16); }
      .panel-strong { fill: rgba(255,255,255,0.70); stroke: rgba(201,100,66,0.18); }
      .line { stroke: rgba(31,26,20,0.08); }
    </style>
    <linearGradient id="page" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F3EA"/>
      <stop offset="0.55" stop-color="#F4F3EE"/>
      <stop offset="1" stop-color="#EDEBE3"/>
    </linearGradient>
    <linearGradient id="heroWash" x1="380" y1="128" x2="1124" y2="426" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCE0C8"/>
      <stop offset="0.58" stop-color="#F6DDE3"/>
      <stop offset="1" stop-color="#E7DDF1"/>
    </linearGradient>
    <linearGradient id="rule" x1="424" y1="362" x2="1078" y2="362" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C96442"/>
      <stop offset="0.32" stop-color="#D17847"/>
      <stop offset="0.66" stop-color="#5A9DA8"/>
      <stop offset="1" stop-color="#8B7BB8"/>
    </linearGradient>
    <filter id="matteShadow" x="-8%" y="-10%" width="116%" height="125%" color-interpolation-filters="sRGB">
