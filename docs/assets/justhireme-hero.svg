<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">JustHireMe README banner</title>
  <desc id="desc">A typography-first JustHireMe banner with cohesive local-first job intelligence UI components.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF6EE"/>
      <stop offset="0.55" stop-color="#F4F3EE"/>
      <stop offset="1" stop-color="#EDE7DC"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="256" y1="405" x2="1350" y2="492" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1F1A14"/>
      <stop offset="0.52" stop-color="#1F1A14"/>
      <stop offset="0.72" stop-color="#C96442"/>
      <stop offset="0.88" stop-color="#5A9DA8"/>
      <stop offset="1" stop-color="#8B7BB8"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="330" y1="552" x2="1270" y2="552" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C96442"/>
      <stop offset="0.28" stop-color="#D17847"/>
      <stop offset="0.58" stop-color="#5A9DA8"/>
      <stop offset="1" stop-color="#8B7BB8"/>
    </linearGradient>
    <filter id="mainShadow" x="-10%" y="-20%" width="120%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#1F1A14" flood-opacity="0.10"/>
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1F1A14" flood-opacity="0.08"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-25%" width="140%" height="155%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#1F1A14" flood-opacity="0.08"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#1F1A14" stroke-opacity="0.035"/>
      <circle cx="0" cy="0" r="1.3" fill="#1F1A14" opacity="0.07"/>
    </pattern>
    <style>
      .display { font-family: Fraunces, "Instrument Serif", Georgia, ui-serif, serif; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: "JetBrains Mono", Consolas, ui-monospace, monospace; }
      .panel { fill: rgba(255,255,255,0.72); stroke: rgba(31,26,20,0.10); }
      .softPanel { fill: rgba(255,255,255,0.52); stroke: rgba(201,100,66,0.18); }
      .ink { fill: #1F1A14; }
      .muted { fill: #6F675C; }
      .micro { font-size: 17px; font-weight: 800; letter-spacing: 0; }
      .tiny { font-size: 13px; font-weight: 750; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#paper)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.9"/>
  <path d="M0 166C154 74 330 42 525 72C712 100 822 174 1007 134C1210 90 1372 54 1600 128V0H0V166Z" fill="#FCE0C8" opacity="0.48"/>
  <path d="M0 744C170 678 324 686 463 738C642 804 793 845 981 794C1195 736 1382 728 1600 808V900H0V744Z" fill="#CFE4DF" opacity="0.42"/>

  <g transform="translate(92 68)">
    <rect width="1416" height="764" rx="42" fill="rgba(255,255,255,0.30)" stroke="rgba(31,26,20,0.08)"/>
    <rect x="28" y="28" width="1360" height="708" rx="34" fill="rgba(244,243,238,0.62)" stroke="rgba(31,26,20,0.07)"/>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="150" y="156" width="265" height="122" rx="16" class="panel"/>
    <text x="178" y="194" class="sans micro ink">Sources</text>
    <text x="178" y="232" class="mono" font-size="38" font-weight="850" fill="#1F1A14">12</text>
    <circle cx="293" cy="222" r="7" fill="#6A9068"/>
    <circle cx="318" cy="222" r="7" fill="#6A9068"/>
    <circle cx="343" cy="222" r="7" fill="#D17847"/>
    <circle cx="368" cy="222" r="7" fill="#5A9DA8"/>

    <rect x="462" y="116" width="300" height="116" rx="16" class="softPanel"/>
    <text x="490" y="154" class="sans micro ink">Quality gate</text>
    <rect x="490" y="178" width="218" height="14" rx="7" fill="#EDEBE3"/>
    <rect x="490" y="178" width="168" height="14" rx="7" fill="#6A9068"/>
    <text x="666" y="197" class="mono" font-size="30" font-weight="850" fill="#2D4A2E">89%</text>

    <rect x="838" y="116" width="300" height="116" rx="16" class="softPanel"/>
    <text x="866" y="154" class="sans micro ink">Fit ranking</text>
    <path d="M870 194C900 176 922 185 944 168C971 147 995 177 1018 156C1042 134 1066 162 1094 142" stroke="#C96442" stroke-width="5" stroke-linecap="round"/>
    <circle cx="1094" cy="142" r="7" fill="#C96442"/>

    <rect x="1186" y="156" width="265" height="122" rx="16" class="panel"/>
    <text x="1214" y="194" class="sans micro ink">Materials</text>
    <rect x="1214" y="214" width="72" height="14" rx="7" fill="#B5AFA3"/>
    <rect x="1214" y="240" width="148" height="14" rx="7" fill="#DCEAD4"/>
    <circle cx="1390" cy="234" r="20" fill="#DCEAD4" stroke="#6A9068" stroke-width="3"/>
    <path d="M1382 234L1388 240L1399 226" stroke="#2D4A2E" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#mainShadow)">
    <text x="800" y="488" text-anchor="middle" class="display" font-size="202" font-weight="720" letter-spacing="-2" fill="url(#wordmark)">JustHireMe</text>
    <text x="800" y="488" text-anchor="middle" class="display" font-size="202" font-weight="720" letter-spacing="-2" fill="none" stroke="rgba(31,26,20,0.13)" stroke-width="1.2">JustHireMe</text>
  </g>

  <g>
    <rect x="330" y="548" width="940" height="10" rx="5" fill="url(#ribbon)"/>
    <rect x="480" y="575" width="640" height="48" rx="8" fill="rgba(255,255,255,0.62)" stroke="rgba(31,26,20,0.08)"/>
    <text x="800" y="606" text-anchor="middle" class="sans" font-size="22" font-weight="760" letter-spacing="0" fill="#4A463E">local-first job intelligence for people who want signal, not noise</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="164" y="610" width="338" height="134" rx="16" class="panel"/>
    <text x="192" y="648" class="sans micro ink">Lead pipeline</text>
    <g transform="translate(192 674)">
      <circle cx="8" cy="8" r="8" fill="#C96442"/>
      <rect x="28" y="2" width="98" height="12" rx="6" fill="#8A847A" opacity="0.55"/>
      <rect x="154" y="2" width="66" height="12" rx="6" fill="#FCE0C8"/>
      <circle cx="264" cy="8" r="8" fill="#6A9068"/>
      <circle cx="290" cy="8" r="8" fill="#6A9068"/>
      <circle cx="316" cy="8" r="8" fill="#D8D4C7"/>
    </g>
    <g transform="translate(192 710)">
      <circle cx="8" cy="8" r="8" fill="#5A9DA8"/>
      <rect x="28" y="2" width="126" height="12" rx="6" fill="#8A847A" opacity="0.55"/>
      <rect x="178" y="2" width="72" height="12" rx="6" fill="#DCEAD4"/>
      <circle cx="264" cy="8" r="8" fill="#D17847"/>
      <circle cx="290" cy="8" r="8" fill="#D8D4C7"/>
      <circle cx="316" cy="8" r="8" fill="#D8D4C7"/>
    </g>

    <rect x="630" y="642" width="340" height="132" rx="16" fill="#1F1A14" opacity="0.94"/>
    <text x="658" y="680" class="sans micro" fill="#F4F3EE">Local profile graph</text>
    <g transform="translate(670 702)">
      <path d="M76 28L28 8M76 28L34 66M76 28L138 10M76 28L156 64M138 10L202 38" stroke="#B5AFA3" stroke-opacity="0.45" stroke-width="2"/>
      <circle cx="76" cy="28" r="16" fill="#6A9068"/>
      <circle cx="28" cy="8" r="8" fill="#5A9DA8"/>
      <circle cx="34" cy="66" r="8" fill="#D17847"/>
      <circle cx="138" cy="10" r="8" fill="#8B7BB8"/>
      <circle cx="156" cy="64" r="8" fill="#C28098"/>
      <circle cx="202" cy="38" r="8" fill="#D9A33F"/>
    </g>

    <rect x="1098" y="610" width="338" height="134" rx="16" class="panel"/>
    <text x="1126" y="648" class="sans micro ink">Tailored package</text>
    <rect x="1126" y="672" width="64" height="48" rx="8" fill="#FFFDF8" stroke="rgba(31,26,20,0.10)"/>
    <rect x="1206" y="672" width="64" height="48" rx="8" fill="#FFFDF8" stroke="rgba(31,26,20,0.10)"/>
    <rect x="1286" y="672" width="64" height="48" rx="8" fill="#FFFDF8" stroke="rgba(31,26,20,0.10)"/>
    <path d="M1144 692H1172M1144 704H1164" stroke="#C96442" stroke-width="5" stroke-linecap="round"/>
    <path d="M1224 692H1252M1224 704H1244" stroke="#5A9DA8" stroke-width="5" stroke-linecap="round"/>
    <path d="M1304 692H1332M1304 704H1324" stroke="#8B7BB8" stroke-width="5" stroke-linecap="round"/>
    <circle cx="1388" cy="696" r="21" fill="#DCEAD4" stroke="#6A9068" stroke-width="3"/>
    <path d="M1379 696L1386 703L1398 688" stroke="#2D4A2E" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g class="mono" font-size="16" font-weight="800" fill="#6F675C">
    <text x="258" y="806" text-anchor="middle">SOURCES</text>
    <text x="506" y="806" text-anchor="middle">QUALITY</text>
    <text x="800" y="806" text-anchor="middle">MATCHING</text>
    <text x="1094" y="806" text-anchor="middle">TAILORING</text>
    <text x="1340" y="806" text-anchor="middle">CONTROL</text>
  </g>
</svg>
