<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Just Hire Me hero banner</title>
  <desc id="desc">A warm typographic banner for Just Hire Me with cohesive product UI components for sources, quality gate, ranking, graph matching, and tailored materials.</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#1F1A14" flood-opacity="0.12"/>
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1F1A14" flood-opacity="0.08"/>
    </filter>
    <filter id="tinyShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#1F1A14" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="paperWash" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F3EA"/>
      <stop offset="0.48" stop-color="#F4F3EE"/>
      <stop offset="1" stop-color="#EEE8DC"/>
    </linearGradient>
    <linearGradient id="heroInk" x1="220" y1="250" x2="850" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1F1A14"/>
      <stop offset="0.72" stop-color="#403A32"/>
      <stop offset="1" stop-color="#C96442"/>
    </linearGradient>
    <linearGradient id="accentBand" x1="220" y1="610" x2="1020" y2="610" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C96442"/>
      <stop offset="0.32" stop-color="#D17847"/>
      <stop offset="0.66" stop-color="#5A9DA8"/>
      <stop offset="1" stop-color="#8B7BB8"/>
    </linearGradient>
    <pattern id="dotGrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.3" fill="#1F1A14" opacity="0.08"/>
    </pattern>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .display { font-family: Fraunces, "Instrument Serif", Georgia, ui-serif, serif; }
      .mono { font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace; }
      .ink { fill: #1F1A14; }
      .muted { fill: #6F675C; }
      .faint { fill: #A9A197; }
      .line { stroke: rgba(31, 26, 20, 0.12); }
      .panel { fill: rgba(255, 255, 255, 0.58); stroke: rgba(201, 100, 66, 0.18); }
      .panelStrong { fill: rgba(255, 255, 255, 0.78); stroke: rgba(201, 100, 66, 0.18); }
      .label { font-size: 22px; font-weight: 800; letter-spacing: 0; }
      .micro { font-size: 15px; font-weight: 700; letter-spacing: 0; }
      .tiny { font-size: 13px; font-weight: 650; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#paperWash)"/>
  <rect width="1600" height="900" fill="url(#dotGrid)" opacity="0.55"/>
